<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Recognition LIFF</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --success: #22c55e; --bg: #0f172a; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Noto Sans Thai', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; box-sizing: border-box; }
        input { background: #1e293b; color: white; border: 1px solid #334155; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #64748b; cursor: not-allowed; }
        #loginPage { display: block; text-align: center; margin-top: 10vh; }
        #mainPage { display: none; }
        .img-view { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-top: 10px; background: #000; }
        #status { text-align: center; font-weight: bold; margin: 15px 0; color: #94a3b8; }
        .result-panel { display: none; border-top: 4px solid var(--primary); padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage" class="card">
        <h2>🔒 เข้าสู่ระบบ</h2>
        <input type="text" id="user" placeholder="ชื่อผู้ใช้งาน">
        <input type="password" id="pass" placeholder="รหัสผ่าน">
        <button onclick="handleLogin()" id="btnLogin">เข้าสู่ระบบ</button>
    </div>

    <div id="mainPage">
        <h3 style="text-align:center;">🕵️ ระบบสแกนใบหน้า (LIFF)</h3>
        <div id="status">⏳ กำลังโหลดโมเดล AI...</div>

        <div class="card">
            <h4>1. ลงทะเบียนใบหน้า</h4>
            <input type="text" id="personName" placeholder="ชื่อ-นามสกุล">
            <input type="text" id="idCard" placeholder="เลขบัตร 13 หลัก" maxlength="13">
            <input type="file" id="uploadFile" accept="image/*">
            <button onclick="enrollFace()">บันทึกข้อมูล</button>
        </div>

        <div class="card" style="border-left: 5px solid var(--success);">
            <h4>2. เปรียบเทียบใบหน้า</h4>
            <input type="file" id="searchFile" accept="image/*">
            <button onclick="searchFace()" style="background: var(--success);">เริ่มการค้นหา</button>
        </div>

        <div id="resultPanel" class="card result-panel">
            <h4 style="text-align:center;">📊 ผลการตรวจสอบ</h4>
            <div style="display:flex; gap:10px;">
                <img id="queryImgView" class="img-view">
                <img id="databaseImgView" class="img-view">
            </div>
            <div style="text-align:center; margin-top:15px;">
                <div id="matchScore" style="font-size:32px; color:var(--success); font-weight:bold;">0%</div>
                <div id="displayName" style="font-size:18px; margin-top:10px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ แก้ไขจุดนี้: ใส่ URL ของ Google Apps Script ที่ Deploy แล้ว
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwK9r4v42P7mrMyRrfJvFXF0h2J4CY9-YOVrFHDMicHcKRHYRJoevFZUDUAYM_4Phqy/exec"; 
    
    let isAiReady = false;

    // 1. ระบบ Login (เรียกผ่าน fetch POST)
    async function handleLogin() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btnLogin');
        
        if(!user || !pass) return alert("กรุณากรอกข้อมูล");
        
        btn.disabled = true;
        btn.innerText = "⏳ กำลังตรวจสอบ...";

        try {
            const resp = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "login", user, pass })
            });
            const data = await resp.json();
            
            if (data.result === true) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainPage').style.display = 'block';
                loadModels();
            } else {
                alert("❌ ชื่อหรือรหัสผ่านผิด");
            }
        } catch (e) {
            alert("Error: ระบบขัดข้อง กรุณาเช็คการตั้งค่า CORS หรือ URL");
        } finally {
            btn.disabled = false;
            btn.innerText = "เข้าสู่ระบบ";
        }
    }

    // 2. โหลด AI Models
    async function loadModels() {
        const statusEl = document.getElementById('status');
        try {
            const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            isAiReady = true;
            statusEl.innerText = '✅ AI พร้อมทำงาน';
            statusEl.style.color = '#22c55e';
        } catch (err) {
            statusEl.innerText = '❌ โหลด AI ผิดพลาด';
        }
    }

    // 3. ลงทะเบียนใบหน้า (Enroll)
    async function enrollFace() {
        const name = document.getElementById('personName').value;
        const idCard = document.getElementById('idCard').value;
        const file = document.getElementById('uploadFile').files[0];
        if (!isAiReady || !name || !file) return alert("ข้อมูลไม่ครบ");

        const img = await faceapi.bufferToImage(file);
        const detection = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
        
        if (!detection) return alert("ตรวจไม่พบใบหน้า");

        // ตัดภาพส่วนหน้าทำ Base64
        const faceCanvas = await faceapi.extractFaces(img, [detection.detection.box]);
        const base64 = faceCanvas[0].toDataURL();

        const resp = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "enroll",
                name: name,
                idCard: idCard,
                image: base64,
                embedding: Array.from(detection.descriptor)
            })
        });
        const res = await resp.json();
        alert(res.result);
    }

    // 4. เปรียบเทียบใบหน้า (Search)
    async function searchFace() {
        const file = document.getElementById('searchFile').files[0];
        if (!file || !isAiReady) return;

        document.getElementById('status').innerText = "⏳ กำลังเปรียบเทียบ...";
        const img = await faceapi.bufferToImage(file);
        document.getElementById('queryImgView').src = URL.createObjectURL(file);

        const queryDet = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
        if (!queryDet) return alert("ไม่พบใบหน้า");

        // ดึงข้อมูลจาก GAS ด้วย GET
        const resp = await fetch(`${GAS_URL}?action=getAllFaces`);
        const dbFaces = await resp.json();

        let bestMatch = { distance: 1.0, name: "ไม่พบข้อมูล", url: "" };
        const threshold = 0.40; // 🎯 ปรับความเข้มงวดตรงนี้

        dbFaces.forEach(face => {
            const dist = faceapi.euclideanDistance(queryDet.descriptor, new Float32Array(face.embedding));
            if (dist < bestMatch.distance) {
                bestMatch = { ...face, distance: dist };
            }
        });

        if (bestMatch.distance < threshold) {
            const score = Math.round((1 - bestMatch.distance) * 100);
            document.getElementById('matchScore').innerText = score + "%";
            document.getElementById('displayName').innerText = bestMatch.name;
            document.getElementById('databaseImgView').src = bestMatch.url;
            document.getElementById('resultPanel').style.display = 'block';
        } else {
            alert("❌ ไม่พบบุคคลที่ตรงกัน");
        }
        document.getElementById('status').innerText = "✅ ค้นหาเสร็จสิ้น";
    }
</script>

</body>
</html>
